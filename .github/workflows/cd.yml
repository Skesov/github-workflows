name: Reusable CD

on:
  workflow_call:
    inputs:
      # === Lint / test ===
      python-version:
        description: "Python version for uv"
        type: string
        default: "3.12"
      ruff-paths:
        description: "Paths to lint (space-separated)"
        type: string
        default: "."
      pytest-paths:
        description: "Paths to test (space-separated)"
        type: string
        default: "."
      pytest-args:
        description: "Extra pytest arguments"
        type: string
        default: ""
      pytest-env:
        description: 'Environment variables for pytest as JSON (e.g. {"KEY": "value"})'
        type: string
        default: "{}"

      # === Single-image mode (used when `images` is empty) ===
      image-name:
        description: "Docker image name (e.g. owner/repo). Required when `images` is empty."
        type: string
        default: ""
      docker-context:
        description: "Docker build context path"
        type: string
        default: "."
      dockerfile:
        description: "Path to Dockerfile (relative to repo root). Empty means <context>/Dockerfile."
        type: string
        default: ""
      build-args:
        description: "Newline-separated KEY=value build args"
        type: string
        default: ""
      cache-scope:
        description: "Optional GHA build cache scope"
        type: string
        default: ""
      manifest-path:
        description: "Path to HelmRelease file in homelab repo. Required when `images` is empty."
        type: string
        default: ""
      tag-paths:
        description: "Newline-separated yq paths to update with the new version"
        type: string
        default: ".spec.values.image.tag"

      # === Multi-image mode ===
      images:
        description: |
          Optional YAML list of component image specs. When set, takes priority over single-image inputs.
          Each entry: { name, package-path, context?, dockerfile?, build-args?, cache-scope?,
                        manifest-path, tag-paths?, platforms? }
          `package-path` must match a key in release-please-config.json.
        type: string
        default: ""

      # === Shared ===
      platforms:
        description: "Default target platforms (comma-separated). Overridable per-image."
        type: string
        default: "linux/amd64,linux/arm64"
      homelab-repo:
        description: "GitOps repo to update"
        type: string
        default: "Skesov/homelab"
      environment:
        description: "GitHub Environment name for protection rules"
        type: string
        default: "production"

      # === Release-please ===
      target-branch:
        description: "Branch to release from"
        type: string
        default: "master"
      release-config-file:
        description: "Path to release-please-config.json (empty = repo default)"
        type: string
        default: ""
      release-manifest-file:
        description: "Path to .release-please-manifest.json (empty = repo default)"
        type: string
        default: ""

    secrets:
      registry-token:
        description: "Token for container registry auth"
        required: true
      gitops-token:
        description: "GitHub PAT with write access to homelab repo"
        required: true

    outputs:
      releases_created:
        description: "true if any release was created"
        value: ${{ jobs.release.outputs.releases_created }}
      released_packages:
        description: "JSON array of released packages (see _release.yml outputs)"
        value: ${{ jobs.release.outputs.released_packages }}

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ inputs.python-version }}
      - run: uv sync --frozen --dev
      - name: ruff check
        env:
          RUFF_PATHS: ${{ inputs.ruff-paths }}
        run: uv run ruff check "$RUFF_PATHS"
      - name: ruff format
        env:
          RUFF_PATHS: ${{ inputs.ruff-paths }}
        run: uv run ruff format --check "$RUFF_PATHS"

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ inputs.python-version }}
      - run: uv sync --frozen --dev
      - name: Export secrets to env
        env:
          _SECRETS: ${{ toJSON(secrets) }}
        run: |
          echo "$_SECRETS" \
            | jq -r 'to_entries[]
                | select(.key != "github_token")
                | "\(.key)=\(.value)"' \
            >> "$GITHUB_ENV"
        shell: bash

      - name: Export pytest-env to env
        if: inputs.pytest-env != '{}'
        env:
          PYTEST_ENV: ${{ inputs.pytest-env }}
        run: echo "$PYTEST_ENV" | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"
        shell: bash

      - name: pytest
        env:
          PYTEST_PATHS: ${{ inputs.pytest-paths }}
          PYTEST_ARGS: ${{ inputs.pytest-args }}
        run: |
          # shellcheck disable=SC2086
          uv run pytest "$PYTEST_PATHS" $PYTEST_ARGS

  release:
    needs: [lint, test]
    uses: Skesov/github-workflows/.github/workflows/_release.yml@master
    with:
      target-branch: ${{ inputs.target-branch }}
      config-file: ${{ inputs.release-config-file }}
      manifest-file: ${{ inputs.release-manifest-file }}

  transform:
    needs: release
    if: needs.release.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.t.outputs.build_matrix }}
    steps:
      - name: Build matrix from images / single-image inputs
        id: t
        env:
          IMAGES: ${{ inputs.images }}
          SINGLE_NAME: ${{ inputs.image-name }}
          SINGLE_CONTEXT: ${{ inputs.docker-context }}
          SINGLE_DOCKERFILE: ${{ inputs.dockerfile }}
          SINGLE_BUILD_ARGS: ${{ inputs.build-args }}
          SINGLE_CACHE_SCOPE: ${{ inputs.cache-scope }}
          SINGLE_MANIFEST: ${{ inputs.manifest-path }}
          SINGLE_TAG_PATHS: ${{ inputs.tag-paths }}
          PLATFORMS: ${{ inputs.platforms }}
          RELEASED: ${{ needs.release.outputs.released_packages }}
        run: |
          set -euo pipefail

          if [ -n "$IMAGES" ]; then
            specs=$(yq -o=json '.' <<<"$IMAGES")
          else
            if [ -z "$SINGLE_NAME" ] || [ -z "$SINGLE_MANIFEST" ]; then
              echo "::error::Either 'images' or both 'image-name' and 'manifest-path' must be set"
              exit 1
            fi
            specs=$(jq -nc \
              --arg name "$SINGLE_NAME" \
              --arg ctx "$SINGLE_CONTEXT" \
              --arg dfile "$SINGLE_DOCKERFILE" \
              --arg args "$SINGLE_BUILD_ARGS" \
              --arg scope "$SINGLE_CACHE_SCOPE" \
              --arg mfest "$SINGLE_MANIFEST" \
              --arg tpaths "$SINGLE_TAG_PATHS" \
              '[{
                name: $name,
                "package-path": ".",
                context: $ctx,
                dockerfile: $dfile,
                "build-args": $args,
                "cache-scope": $scope,
                "manifest-path": $mfest,
                "tag-paths": $tpaths
              }]')
          fi

          matrix=$(jq -nc \
            --argjson specs "$specs" \
            --argjson released "$RELEASED" \
            --arg platforms "$PLATFORMS" '
              {
                include: [
                  $specs[] as $s
                  | ($released[] | select(.path == $s["package-path"])) as $r
                  | {
                      name:          $s.name,
                      context:       ($s.context // "."),
                      dockerfile:    ($s.dockerfile // ""),
                      "build-args":  ($s["build-args"] // ""),
                      "cache-scope": ($s["cache-scope"] // ""),
                      "manifest-path": $s["manifest-path"],
                      "tag-paths":   ($s["tag-paths"] // ".spec.values.image.tag"),
                      platforms:     ($s.platforms // $platforms),
                      version:       $r.version,
                      tag:           $r.tag
                    }
                ]
              }
          ')

          count=$(jq '.include | length' <<<"$matrix")
          echo "Matrix entries: $count"
          jq '.' <<<"$matrix"

          if [ "$count" = "0" ]; then
            echo "::error::Release created but no image spec matched a released package-path."
            echo "::error::Check 'images[*].package-path' against release-please-config.json packages."
            exit 1
          fi

          {
            echo "build_matrix<<EOF"
            echo "$matrix"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        shell: bash

  build:
    needs: [release, transform]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.transform.outputs.build_matrix) }}
    uses: Skesov/github-workflows/.github/workflows/_docker.yml@master
    with:
      image-name: ${{ matrix.name }}
      version: ${{ matrix.version }}
      context: ${{ matrix.context }}
      dockerfile: ${{ matrix.dockerfile }}
      build-args: ${{ matrix.build-args }}
      cache-scope: ${{ matrix.cache-scope }}
      platforms: ${{ matrix.platforms }}
    secrets:
      registry-token: ${{ secrets.registry-token }}

  deploy:
    needs: [release, transform, build]
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJSON(needs.transform.outputs.build_matrix) }}
    uses: Skesov/github-workflows/.github/workflows/_deploy.yml@master
    with:
      version: ${{ matrix.version }}
      homelab-repo: ${{ inputs.homelab-repo }}
      manifest-path: ${{ matrix.manifest-path }}
      tag-paths: ${{ matrix.tag-paths }}
      environment: ${{ inputs.environment }}
    secrets:
      gitops-token: ${{ secrets.gitops-token }}
