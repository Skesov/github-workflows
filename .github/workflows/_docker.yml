name: Reusable Docker Build

on:
  workflow_call:
    inputs:
      registry:
        description: "Container registry"
        type: string
        default: "ghcr.io"
      image-name:
        description: "Image name (e.g., owner/repo)"
        type: string
        required: true
      version:
        description: "Version tag for the image (e.g., 1.2.3)"
        type: string
        required: true
      platforms:
        description: "Target platforms (comma-separated)"
        type: string
        default: "linux/amd64,linux/arm64"
      context:
        description: "Docker build context path"
        type: string
        default: "."
      dockerfile:
        description: "Path to Dockerfile (relative to repo root). Empty means <context>/Dockerfile."
        type: string
        default: ""
      build-args:
        description: "Newline-separated KEY=value build args forwarded to docker/build-push-action."
        type: string
        default: ""
      cache-scope:
        description: "Optional GHA build cache scope (set when one repo builds multiple images)."
        type: string
        default: ""
    secrets:
      registry-token:
        description: "Token for container registry auth"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.registry-token }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ inputs.registry }}/${{ inputs.image-name }}
          tags: |
            type=raw,value=${{ inputs.version }}
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          build-args: ${{ inputs.build-args }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: >-
            ${{ inputs.cache-scope != ''
                && format('type=gha,scope={0}', inputs.cache-scope)
                || 'type=gha' }}
          cache-to: >-
            ${{ inputs.cache-scope != ''
                && format('type=gha,mode=max,scope={0}', inputs.cache-scope)
                || 'type=gha,mode=max' }}
