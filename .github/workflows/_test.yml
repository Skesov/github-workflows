name: Reusable Test (Python + pytest)

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version for uv"
        type: string
        default: "3.12"
      pytest-paths:
        description: "Path to test"
        type: string
        default: "."
      pytest-args:
        description: "Extra pytest arguments"
        type: string
        default: ""
      pytest-env:
        description: 'Environment variables for pytest as JSON (e.g. {"KEY": "value"})'
        type: string
        default: "{}"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ inputs.python-version }}

      - run: uv sync --frozen --dev

      - name: Export secrets to env
        env:
          _SECRETS: ${{ toJSON(secrets) }}
        run: |
          echo "$_SECRETS" \
            | jq -r 'to_entries[]
                | select(.key != "github_token")
                | "\(.key)=\(.value)"' \
            >> "$GITHUB_ENV"
        shell: bash

      - name: Export pytest-env to env
        if: inputs.pytest-env != '{}'
        env:
          PYTEST_ENV: ${{ inputs.pytest-env }}
        run: echo "$PYTEST_ENV" | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"
        shell: bash

      - name: pytest
        env:
          PYTEST_PATHS: ${{ inputs.pytest-paths }}
          PYTEST_ARGS: ${{ inputs.pytest-args }}
        run: |
          # shellcheck disable=SC2086
          uv run pytest "$PYTEST_PATHS" $PYTEST_ARGS
